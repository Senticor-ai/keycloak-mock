name: PNPM CI

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0
      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '24'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Check coverage
        run: pnpm coverage
      - name: Build package
        run: pnpm build
      - name: Check package contents
        run: pnpm pack --dry-run

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0
      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance
